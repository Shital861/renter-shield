repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
  - repo: local
    hooks:
      - id: semgrep-scan
        name: Semgrep Scan
        entry: renter-shield/.venv/Scripts/semgrep.exe scan --config renter-shield/.semgrep/rules.yaml --error
        language: system
        types: [python]
        files: ^renter-shield/app/
